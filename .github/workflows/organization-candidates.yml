name: Organization metadata candidates

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * 0'

permissions:
  contents: read
  issues: write

concurrency:
  group: organization-metadata-candidates
  cancel-in-progress: false

jobs:
  build-candidates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Build candidate report
        run: |
          mkdir -p .tmp
          python scripts/build_organization_candidates.py --output-json .tmp/organization_candidates.json --output-md .tmp/organization_candidates.md
      - name: Read candidate count
        id: candidates
        run: |
          count=$(python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('.tmp/organization_candidates.json').read_text(encoding='utf-8'))
          print(data.get('candidateCount', 0))
          PY
          )
          echo "count=${count}" >> "$GITHUB_OUTPUT"
      - name: Create or update review issue
        if: steps.candidates.outputs.count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_TITLE: "[dashboard] жңӘзҷ»йҢІзө„з№”гҒ®дјҒжҘӯжғ…е ұзўәиӘҚ"
        run: |
          existing=$(gh issue list --state open --search "$ISSUE_TITLE in:title" --json number --jq '.[0].number // ""')
          if [ -n "$existing" ]; then
            gh issue edit "$existing" --title "$ISSUE_TITLE" --body-file .tmp/organization_candidates.md
          else
            gh issue create --title "$ISSUE_TITLE" --body-file .tmp/organization_candidates.md
          fi
      - name: No candidates
        if: steps.candidates.outputs.count == '0'
        run: echo "No unregistered organizations found."
